name: simba_chiplet
type: compute

memories:

  weight_registers:
    size: 512  # 8 word-bits * 64 cluster_size
    r_cost: 0.08  # TODO
    w_cost: 0.08  # TODO
    area: 0
    latency: 1
    operands: [I2]  # Weights
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 8
        bandwidth_max: 8
        allocation:
          - I2, tl
      - name: w_port_1
        type: write
        bandwidth_min: 8
        bandwidth_max: 8
        allocation:
          - I2, fh
    served_dimensions: []

  weight_buffer:
    size: 32768  # 4096 depth * 8 width
    r_cost: 0.5  # TODO
    w_cost: 0.5
    area: 0
    latency: 1
    operands: [I2]  # Weights
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 64
        bandwidth_max: 64
        allocation:
          - I2, tl
      - name: w_port_1
        type: write
        bandwidth_min: 64
        bandwidth_max: 64
        allocation:
          - I2, fh
    served_dimensions: [D3, D4]

  accumulation_buffer:
    size: 3072   # 128 depth * 24 width
    r_cost: 0.1  # TODO
    w_cost: 0.1
    area: 0
    latency: 1
    operands: [O]  # Partial sums
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 192
        bandwidth_max: 192
        allocation:
          - O, tl
          - O, th
      - name: w_port_1
        type: write
        bandwidth_min: 192
        bandwidth_max: 192
        allocation:
          - O, fh
          - O, fl
    served_dimensions: [D3, D4]

  input_buffer:
    size: 524288   # 8192 depth * 64 width
    r_cost: 7  # TODO
    w_cost: 7  # TODO
    area: 0
    latency: 1
    operands: [I1]  # Input activations
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 64
        bandwidth_max: 64
        allocation:
          - I1, tl
      - name: w_port_1
        type: write
        bandwidth_min: 64
        bandwidth_max: 64
        allocation:
          - I1, fh
    served_dimensions: [D3, D4]

  global_buffer:
    size: 2097152  # 2048 depth * 256 width * 4 banks
    r_cost: 10  # Example cost, refine with more details
    w_cost: 10
    area: 0
    latency: 1
    operands: [I1, I2, O]  # Input activations, weights, partial sums
    ports:
      - name: r_port_1
        type: read
        bandwidth_min: 1024
        bandwidth_max: 1024
        allocation:
          - I1, tl
          - I2, tl
          - O, tl
          - O, th
      - name: w_port_1
        type: write
        bandwidth_min: 1024
        bandwidth_max: 1024
        allocation:
          - I1, fh
          - I2, fh
          - O, fh
          - O, fl
    served_dimensions: [D1, D2, D3, D4]


operational_array:
  unit_energy: 0.04  # Refine with more accurate data if available
  unit_area: 1  # unit
  # D1/2 = 4x4 PE array. Each PE has 8 vector MACS (D3) that process 8 elements (D4) in parallel
  dimensions: [D1, D2, D3, D4]
  sizes: [4, 4, 8, 8]

# No fixed `dataflows`: let ZigZag generate the spatial (PE-array) mapping per layer.
# A fixed dataflow here yielded an EMPTY spatial mapping (near-zero MAC utilization) in
# the generic-mapping pipeline; letting ZigZag generate adapts the unrolling to each
# workload and actually fills the array.
